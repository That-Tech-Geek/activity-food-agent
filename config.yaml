# Activity Food Agent Configuration

# Applications indicating intense work
work_applications:
  - 'code'           # VS Code
  - 'devenv'         # Visual Studio
  - 'terminal'       # Windows Terminal / PowerShell
  - 'excel'          # Microsoft Excel
  - 'figma'          # Figma
  - 'pycharm'        # PyCharm
  - 'cursor'         # Cursor Editor

# Applications indicating fun/relax
fun_applications:
  - 'spotify'
  - 'netflix'
  - 'steam'
  - 'chrome'         # Note: Title filtering logic can be added in code
  - 'vlc'
  - 'discord'

# Agent behavior settings
intensity_threshold: 0.6       # Proportion of time in work apps to be 'INTENSE'
sampling_window_minutes: 10    # Lookback window for state calculation
check_interval_seconds: 60     # Tick rate for activity sensing
auto_order: false              # If true, skips terminal prompt
budget_limit: 1500             # Max order value in INR
preferred_restaurants: []      # Optional list of restaurant names to prioritize

# State-specific preferences
preferences:
  intense_work:
    search_keywords: ['high protein', 'salad', 'bowl', 'smoothie']
    max_delivery_time_minutes: 30
    min_rating: 4.0
    convenience_keywords: ['one-handed', 'wrap', 'sandwich']
    weights:
      nutrition: 0.4
      convenience: 0.3
      speed: 0.2
      rating: 0.1
  fun:
    search_keywords: ['biryani', 'pizza', 'burger', 'chinese', 'momos']
    max_delivery_time_minutes: 45
    min_rating: 3.8
    indulgence_score_boost: true
    weights:
      indulgence: 0.5
      rating: 0.3
      value_for_money: 0.2

